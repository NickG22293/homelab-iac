apiVersion: v1
kind: Namespace
metadata:
  name: nick-g
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nick-g
  namespace: nick-g
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/nickg22293/nick-g
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nick-g
  namespace: nick-g
spec:
  interval: 3m
  timeout: 5m
  chart:
    spec:
      chart: nick-g-chart
      version: '0.1.0'
      sourceRef:
        kind: HelmRepository
        name: nick-g
      interval: 5m
